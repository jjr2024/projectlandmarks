<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Landmarks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fdf5f0',100:'#fce8db',200:'#f9cfb8',300:'#f4ae8a',400:'#ed8c5e',500:'#e47243',600:'#d05a32',700:'#ad4628',800:'#8c3a24',900:'#743220' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="js/store.js"></script>
  <style>
    .gradient-text { background: linear-gradient(135deg, #d05a32, #ed8c5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .auth-bg { background: linear-gradient(135deg, #fdf5f0 0%, #fce8db 50%, #f9cfb8 100%); }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(208,90,50,0.15); }
    .btn-primary { background: linear-gradient(135deg, #d05a32, #ad4628); transition: all 0.15s; }
    .btn-primary:hover { background: linear-gradient(135deg, #ad4628, #8c3a24); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(208,90,50,0.3); }
    .btn-primary:active { transform: translateY(0); }
  </style>
</head>
<body class="font-sans antialiased auth-bg min-h-screen flex items-center justify-center p-6" x-data="authApp()">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 mb-6">
        <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
          </svg>
        </div>
        <span class="font-bold text-gray-900 text-xl">Landmarks</span>
      </a>
      <h1 class="text-2xl font-bold text-gray-900" x-text="mode === 'signup' ? 'Create your account' : 'Welcome back'"></h1>
      <p class="text-gray-500 mt-2 text-sm" x-text="mode === 'signup' ? 'Free forever · Takes 2 minutes' : 'Sign in to your account'"></p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">

      <!-- Error / success alerts -->
      <div x-show="error" x-transition class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span x-text="error"></span>
      </div>

      <form @submit.prevent="handleSubmit" class="space-y-5">

        <!-- Name (signup only) -->
        <div x-show="mode === 'signup'" x-transition>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Your name</label>
          <input
            type="text"
            x-model="form.name"
            placeholder="Alex Chen"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 transition-all"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
          <input
            type="email"
            x-model="form.email"
            placeholder="you@example.com"
            required
            autocomplete="email"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 transition-all"
          />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <span x-show="mode === 'signin'" class="text-xs text-gray-400">Password recovery coming soon</span>
          </div>
          <div class="relative">
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="form.password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 transition-all pr-12"
            />
            <button type="button" @click="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
          <p x-show="mode === 'signup'" class="text-xs text-gray-400 mt-1.5">At least 8 characters</p>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          :disabled="loading"
          class="btn-primary w-full text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 mt-2"
        >
          <svg x-show="loading" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="loading ? 'Please wait…' : (mode === 'signup' ? 'Create account' : 'Sign in')"></span>
        </button>

        <!-- Demo login shortcut -->
        <div x-show="mode === 'signin'" class="text-center">
          <button type="button" @click="demoLogin" class="text-xs text-brand-600 hover:underline">
            Use demo account (demo@landmarks.app / demo1234)
          </button>
        </div>

      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
        <div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-gray-400">OR</span></div>
      </div>

      <!-- Google OAuth placeholder -->
      <button disabled class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-xl py-3 text-gray-400 text-sm font-medium bg-gray-50 cursor-not-allowed opacity-60">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
        <span class="text-xs text-gray-400">(coming soon)</span>
      </button>
    </div>

    <!-- Toggle mode -->
    <p class="text-center mt-6 text-sm text-gray-600">
      <span x-text="mode === 'signup' ? 'Already have an account?' : \"Don't have an account?\""></span>
      <a href="#" @click.prevent="toggleMode" class="text-brand-600 font-medium hover:underline ml-1" x-text="mode === 'signup' ? 'Sign in' : 'Sign up free'"></a>
    </p>
  </div>

  <script>
    Store.seed.run();

    // Redirect if already logged in
    if (Store.auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    function authApp() {
      // Read mode from URL
      const params = new URLSearchParams(window.location.search);
      const initialMode = params.get('mode') === 'signup' ? 'signup' : 'signin';

      return {
        mode: initialMode,
        form: { name: '', email: '', password: '' },
        error: '',
        loading: false,
        showPassword: false,

        toggleMode() {
          this.mode = this.mode === 'signup' ? 'signin' : 'signup';
          this.error = '';
          this.form = { name: '', email: this.form.email, password: '' };
          document.title = (this.mode === 'signup' ? 'Sign Up' : 'Sign In') + ' – Landmarks';
        },

        async handleSubmit() {
          this.error = '';
          if (!this.form.email || !this.form.password) {
            this.error = 'Please fill in all required fields.';
            return;
          }
          if (this.mode === 'signup' && this.form.password.length < 8) {
            this.error = 'Password must be at least 8 characters.';
            return;
          }
          this.loading = true;
          // Simulate network delay
          await new Promise(r => setTimeout(r, 600));
          let result;
          if (this.mode === 'signup') {
            result = Store.auth.signUp(this.form.email, this.form.password, this.form.name);
          } else {
            result = Store.auth.signIn(this.form.email, this.form.password);
          }
          this.loading = false;
          if (result.error) {
            this.error = result.error;
          } else {
            // New signups → guided onboarding. Returning users → dashboard.
            if (this.mode === 'signup') {
              window.location.href = 'onboarding.html';
            } else {
              window.location.href = 'dashboard.html';
            }
          }
        },

        demoLogin() {
          this.form.email = 'demo@landmarks.app';
          this.form.password = 'demo1234';
          this.handleSubmit();
        },
      };
    }
  </script>
</body>
</html>
