<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 80" width="370" height="80">
  <defs>
    <linearGradient id="boldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="50%" stop-color="#d05a32"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
    <linearGradient id="boldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized "D" that doubles as a sunrise/gift tag -->
  <g transform="translate(6, 6)">
    <!-- D shape / shield -->
    <path d="M10 8 L10 60 Q10 64 14 64 L34 64 Q54 64 54 36 Q54 8 34 8 L14 8 Q10 8 10 12 Z" fill="url(#boldGrad1)" rx="4"/>
    <!-- Cutout for the D interior -->
    <path d="M22 20 L22 52 L32 52 Q42 52 42 36 Q42 20 32 20 Z" fill="#fff"/>
    <!-- Sun in the D opening -->
    <circle cx="32" cy="34" r="7" fill="url(#boldGrad2)"/>
    <!-- Small rays -->
    <line x1="32" y1="24" x2="32" y2="22" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="39" y1="27" x2="41" y2="25.5" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="41" y1="34" x2="43.5" y2="34" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Gift tag hole -->
    <circle cx="17" cy="14" r="2.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="55" font-family="'Poppins', 'Montserrat', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">
    Day<tspan fill="url(#boldGrad1)">sight</tspan>
  </text>
</svg>
