<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8734a"/>
      <stop offset="100%" stop-color="#d05a32"/>
    </linearGradient>
  </defs>

  <!-- Icon: sunrise over a rounded calendar page -->
  <g transform="translate(8, 8)">
    <!-- Calendar body -->
    <rect x="4" y="18" width="52" height="42" rx="10" ry="10" fill="url(#warmGrad)"/>
    <!-- Calendar top bar -->
    <rect x="4" y="18" width="52" height="14" rx="10" ry="10" fill="#c04a24"/>
    <rect x="4" y="26" width="52" height="6" rx="0" ry="0" fill="#c04a24"/>
    <!-- Calendar binding dots -->
    <circle cx="20" cy="18" r="3.5" fill="#fff"/>
    <circle cx="40" cy="18" r="3.5" fill="#fff"/>
    <!-- Sunrise arc -->
    <path d="M16 48 Q30 34 44 48" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <!-- Sun rays -->
    <circle cx="30" cy="42" r="5" fill="#fbbf24"/>
    <line x1="30" y1="34" x2="30" y2="32" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="37" x2="20.5" y2="35.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="37" x2="39.5" y2="35.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="55" font-family="'Nunito', 'Quicksand', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" fill="#3b2314" letter-spacing="-0.5">
    Day<tspan fill="url(#warmGrad)">sight</tspan>
  </text>
</svg>
