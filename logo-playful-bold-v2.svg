<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="bCalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="50%" stop-color="#d05a32"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
    <linearGradient id="bGiftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Icon: bold calendar with gift box bursting out the top -->
  <g transform="translate(4, 2)">
    <!-- Calendar body — sharper corners, bolder feel -->
    <rect x="2" y="22" width="62" height="52" rx="8" ry="8" fill="url(#bCalGrad)"/>

    <!-- Calendar header band -->
    <rect x="2" y="22" width="62" height="16" rx="8" ry="8" fill="#a83a18"/>
    <rect x="2" y="32" width="62" height="6" fill="#a83a18"/>

    <!-- Binding pegs (rectangular, bolder) -->
    <rect x="16" y="14" width="6" height="14" rx="2" ry="2" fill="#3b2314"/>
    <rect x="44" y="14" width="6" height="14" rx="2" ry="2" fill="#3b2314"/>

    <!-- Date dots on calendar body — suggests days -->
    <circle cx="16" cy="46" r="2.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="26" cy="46" r="2.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="16" cy="56" r="2.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="26" cy="56" r="2.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="16" cy="66" r="2.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="26" cy="66" r="2.5" fill="rgba(255,255,255,0.3)"/>

    <!-- Gift box — sitting on the right side of the calendar, overlapping the top edge -->
    <!-- Box base -->
    <rect x="38" y="50" width="22" height="18" rx="3" ry="3" fill="#fff"/>
    <!-- Box lid -->
    <rect x="36" y="44" width="26" height="9" rx="3" ry="3" fill="#fff"/>

    <!-- Vertical ribbon -->
    <rect x="47" y="44" width="4" height="24" rx="1" fill="url(#bGiftGrad)"/>
    <!-- Horizontal ribbon -->
    <rect x="36" y="46.5" width="26" height="4" rx="1" fill="url(#bGiftGrad)"/>

    <!-- Bow loops -->
    <ellipse cx="46" cy="42" rx="5" ry="4" fill="url(#bGiftGrad)" transform="rotate(-25 46 42)"/>
    <ellipse cx="53" cy="42" rx="5" ry="4" fill="url(#bGiftGrad)" transform="rotate(25 53 42)"/>
    <!-- Bow knot -->
    <circle cx="49.5" cy="43" r="2.5" fill="#f59e0b"/>

    <!-- Highlighted "today" date circle on the calendar -->
    <circle cx="36" cy="46" r="2.5" fill="#fff" opacity="0"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="57" font-family="'Poppins', 'Montserrat', 'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">
    Day<tspan fill="url(#bCalGrad)">sight</tspan>
  </text>
</svg>
